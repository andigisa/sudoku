name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Unit Tests
        run: pnpm test

      - name: Install Playwright Browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: E2E Tests
        run: pnpm test:e2e --project=chromium
        env:
          CI: true
          PORT: 3002
          PROXY_PORT: 3002
